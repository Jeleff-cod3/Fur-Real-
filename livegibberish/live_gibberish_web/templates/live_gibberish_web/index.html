<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Gibberish Tester</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1b1f24;
      --muted: #5b6472;
      --line: #d7dde5;
      --panel: #f7f9fb;
      --accent: #146c94;
      --ok: #126b42;
      --bad: #9a3412;
      --bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .status {
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      min-width: 180px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 20px;
      padding-top: 20px;
    }

    section {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 16px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin: 10px 0 4px;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 7px 9px;
      font: inherit;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      min-height: 36px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      padding: 7px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    button.danger {
      border-color: var(--bad);
      background: var(--bad);
    }

    button:disabled {
      border-color: var(--line);
      background: #eef1f5;
      color: var(--muted);
      cursor: not-allowed;
    }

    pre,
    .log {
      margin: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 12px;
      overflow: auto;
      min-height: 150px;
      max-height: 520px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .metric strong {
      display: block;
      font-size: 20px;
    }

    .allowed {
      color: var(--ok);
      font-weight: 700;
    }

    .blocked {
      color: var(--bad);
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }

    @media (max-width: 820px) {
      main {
        padding: 16px;
      }

      header,
      .grid {
        display: block;
      }

      .status {
        margin-top: 12px;
        text-align: left;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Live Gibberish Tester</h1>
      </div>
      <div id="connectionStatus" class="status">Idle</div>
    </header>

    <div class="grid">
      <div>
        <section>
          <h2>Config</h2>
          <label for="whitelist">Whitelist Words</label>
          <input id="whitelist" value='{{ status.whitelist|join:", " }}' autocomplete="off">

          <label for="seed">Seed</label>
          <input id="seed" value="{{ status.seed }}" autocomplete="off">

          <div class="row">
            <div>
              <label for="asrBackend">ASR</label>
              <select id="asrBackend">
                <option value="faster-whisper">faster-whisper</option>
              </select>
            </div>
            <div>
              <label for="ttsBackend">TTS</label>
              <select id="ttsBackend">
                <option value="coqui-xtts">coqui-xtts</option>
              </select>
              <div id="ttsHint" class="hint"></div>
            </div>
          </div>

          <label for="asrModel">GPU ASR Model</label>
          <input id="asrModel" value="{{ status.asr_model }}" placeholder="hello danger">
          <div id="modelHint" class="hint"></div>

          <div class="row">
            <div>
              <label for="confidence">Confidence</label>
              <input id="confidence" type="number" step="0.05" min="0" max="1" value="{{ status.confidence }}">
            </div>
            <div>
              <label for="bufferSeconds">Buffer Seconds</label>
              <input id="bufferSeconds" type="number" step="0.5" min="0.5" value="{{ status.buffer_seconds }}">
            </div>
          </div>

          <div class="actions">
            <button id="saveConfig">Save Config</button>
            <button id="refreshStatus" class="secondary">Refresh</button>
          </div>
        </section>

        <section>
          <h2>Microphone</h2>
          <div class="actions">
            <button id="connectSocket">Connect</button>
            <button id="startMic">Start Mic</button>
            <button id="stopMic" class="danger">Stop</button>
          </div>
        </section>

        <section>
          <h2>Server Status</h2>
          <pre id="statusJson">{{ status_json }}</pre>
        </section>
      </div>

      <div>
        <section>
          <h2>Live Results</h2>
          <div class="metrics">
            <div class="metric"><span>Frames Sent</span><strong id="framesSent">0</strong></div>
            <div class="metric"><span>Segments</span><strong id="segmentsSeen">0</strong></div>
            <div class="metric"><span>Audio Bytes</span><strong id="audioBytes">0</strong></div>
            <div class="metric"><span>Sample Rate</span><strong>16k</strong></div>
          </div>
          <div id="log" class="log"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const state = {
      socket: null,
      micStream: null,
      audioContext: null,
      processor: null,
      source: null,
      pendingSamples: [],
      playbackTime: 0,
      framesSent: 0,
      segmentsSeen: 0,
      audioBytes: 0,
      targetRate: 16000,
      frameSamples: 320,
      processorReady: false,
      configPromise: null,
      configResolver: null
    };

    const elements = {
      connectionStatus: document.getElementById("connectionStatus"),
      whitelist: document.getElementById("whitelist"),
      seed: document.getElementById("seed"),
      asrBackend: document.getElementById("asrBackend"),
      asrModel: document.getElementById("asrModel"),
      ttsBackend: document.getElementById("ttsBackend"),
      confidence: document.getElementById("confidence"),
      bufferSeconds: document.getElementById("bufferSeconds"),
      statusJson: document.getElementById("statusJson"),
      log: document.getElementById("log"),
      framesSent: document.getElementById("framesSent"),
      segmentsSeen: document.getElementById("segmentsSeen"),
      audioBytes: document.getElementById("audioBytes")
    };
    const startMicButton = document.getElementById("startMic");

    const initialStatus = {{ status_json|safe }};
    elements.asrBackend.value = initialStatus.asr_backend || "faster-whisper";
    elements.ttsBackend.value = initialStatus.tts_backend || "coqui-xtts";
    renderStatus(initialStatus);

    document.getElementById("saveConfig").addEventListener("click", saveConfig);
    document.getElementById("refreshStatus").addEventListener("click", refreshStatus);
    document.getElementById("connectSocket").addEventListener("click", connectSocket);
    document.getElementById("startMic").addEventListener("click", startMic);
    document.getElementById("stopMic").addEventListener("click", stopAll);
    elements.asrBackend.addEventListener("change", updateModelHint);
    elements.ttsBackend.addEventListener("change", updateTtsHint);
    updateModelHint();
    updateTtsHint();
    updateStartButton();

    async function saveConfig() {
      const payload = readConfig();
      const response = await fetch("/api/config/whitelist/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      renderStatus(data.config || data);
      if (state.socket && state.socket.readyState === WebSocket.OPEN) {
        await applySocketConfig(payload);
      }
      appendLog("Config saved");
    }

    async function refreshStatus() {
      const response = await fetch("/api/status/");
      const data = await response.json();
      renderStatus(data.status || data);
      appendLog("Status refreshed");
    }

    function readConfig() {
      return {
        whitelist: elements.whitelist.value.split(",").map(word => word.trim()).filter(Boolean),
        seed: elements.seed.value.trim() || "cavegame-live-gibberish",
        asr_backend: elements.asrBackend.value,
        asr_model: elements.asrModel.value,
        tts_backend: elements.ttsBackend.value,
        confidence: Number(elements.confidence.value || 0.7),
        buffer_seconds: Number(elements.bufferSeconds.value || 5)
      };
    }

    function connectSocket() {
      if (state.socket && state.socket.readyState === WebSocket.OPEN) {
        appendLog("WebSocket is already connected");
        return;
      }

      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      const socket = new WebSocket(`${protocol}//${location.host}/ws/audio/`);
      socket.binaryType = "arraybuffer";
      socket.onopen = () => {
        state.socket = socket;
        state.processorReady = false;
        updateStartButton();
        elements.connectionStatus.textContent = "Connected";
        applySocketConfig(readConfig());
        appendLog("WebSocket connected");
      };
      socket.onclose = () => {
        state.processorReady = false;
        updateStartButton();
        elements.connectionStatus.textContent = "Closed";
        appendLog("WebSocket closed");
      };
      socket.onerror = () => {
        elements.connectionStatus.textContent = "Error";
        appendLog("WebSocket error");
      };
      socket.onmessage = event => {
        if (typeof event.data === "string") {
          handleJsonMessage(event.data);
        } else {
          handleAudioMessage(event.data);
        }
      };
    }

    async function startMic() {
      if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
        connectSocket();
        await waitForSocketOpen();
      }
      if (!state.processorReady) {
        appendLog("Waiting for processor to finish loading");
        await waitForProcessorReady();
      }
      if (!state.processorReady) {
        appendLog("Processor is not ready; microphone was not started");
        return;
      }

      state.audioContext = state.audioContext || new AudioContext();
      await state.audioContext.resume();
      state.micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      state.source = state.audioContext.createMediaStreamSource(state.micStream);
      state.processor = state.audioContext.createScriptProcessor(2048, 1, 1);
      state.processor.onaudioprocess = event => {
        const input = event.inputBuffer.getChannelData(0);
        const resampled = resample(input, state.audioContext.sampleRate, state.targetRate);
        for (const sample of resampled) {
          state.pendingSamples.push(sample);
        }
        while (state.pendingSamples.length >= state.frameSamples) {
          const frame = state.pendingSamples.splice(0, state.frameSamples);
          sendPcm16(frame);
        }
      };
      state.source.connect(state.processor);
      state.processor.connect(state.audioContext.destination);
      elements.connectionStatus.textContent = "Streaming";
      appendLog("Microphone started");
    }

    function stopAll() {
      if (state.processor) {
        state.processor.disconnect();
        state.processor = null;
      }
      if (state.source) {
        state.source.disconnect();
        state.source = null;
      }
      if (state.micStream) {
        state.micStream.getTracks().forEach(track => track.stop());
        state.micStream = null;
      }
      if (state.socket) {
        state.socket.close();
        state.socket = null;
      }
      state.processorReady = false;
      updateStartButton();
      elements.connectionStatus.textContent = "Stopped";
      appendLog("Stopped");
    }

    function sendPcm16(samples) {
      if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
        return;
      }
      const bytes = new ArrayBuffer(samples.length * 2);
      const view = new DataView(bytes);
      for (let index = 0; index < samples.length; index++) {
        const sample = Math.max(-1, Math.min(1, samples[index]));
        view.setInt16(index * 2, sample < 0 ? sample * 32768 : sample * 32767, true);
      }
      state.socket.send(bytes);
      state.framesSent += 1;
      elements.framesSent.textContent = String(state.framesSent);
    }

    function handleJsonMessage(text) {
      const data = JSON.parse(text);
      if (data.type === "segment") {
        state.segmentsSeen += 1;
        elements.segmentsSeen.textContent = String(state.segmentsSeen);
        const words = (data.words || []).map(word => {
          const cls = word.allowed ? "allowed" : "blocked";
          const replacement = word.replacement ? ` -> ${word.replacement}` : "";
          return `<span class="${cls}">${escapeHtml(word.word || "?")}</span>${escapeHtml(replacement)}`;
        }).join(", ");
        appendLog(`Segment ${data.start.toFixed(2)}-${data.end.toFixed(2)}s: ${escapeHtml(data.text || "")}\n${words}`);
      } else if (data.type === "ready") {
        state.processorReady = Boolean(data.processor_ready);
        updateStartButton();
        if (data.error) {
          appendLog(`Ready error: ${escapeHtml(data.error)}`);
        } else {
          appendLog(`Socket ready: ${escapeHtml(data.status || "ready")}`);
        }
      } else if (data.type === "processor") {
        state.processorReady = Boolean(data.ok);
        updateStartButton();
        appendLog(`Processor ${escapeHtml(data.status || "status")} ${escapeHtml(data.backend || "")} ${escapeHtml(data.model || "")}`);
      } else if (data.type === "config") {
        state.processorReady = Boolean(data.processor_ready || data.ok);
        updateStartButton();
        if (state.configResolver) {
          state.configResolver(state.processorReady);
          state.configResolver = null;
          state.configPromise = null;
        }
        appendLog(data.ok ? "Processor ready" : `Processor error: ${escapeHtml(data.error || "unknown")}`);
      } else if (data.type === "error") {
        appendLog(`Error: ${escapeHtml(data.message || JSON.stringify(data))}`);
      } else {
        appendLog(JSON.stringify(data));
      }
    }

    function handleAudioMessage(buffer) {
      state.audioBytes += buffer.byteLength;
      elements.audioBytes.textContent = String(state.audioBytes);
      const samples = pcm16ToFloat32(buffer);
      playSamples(samples);
    }

    function playSamples(samples) {
      state.audioContext = state.audioContext || new AudioContext();
      const audioBuffer = state.audioContext.createBuffer(1, samples.length, state.targetRate);
      audioBuffer.copyToChannel(samples, 0);
      const source = state.audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(state.audioContext.destination);
      const now = state.audioContext.currentTime;
      state.playbackTime = Math.max(now + 0.03, state.playbackTime);
      source.start(state.playbackTime);
      state.playbackTime += audioBuffer.duration;
    }

    function resample(input, sourceRate, targetRate) {
      if (sourceRate === targetRate) {
        return Array.from(input);
      }
      const ratio = sourceRate / targetRate;
      const outputLength = Math.floor(input.length / ratio);
      const output = new Array(outputLength);
      for (let index = 0; index < outputLength; index++) {
        const position = index * ratio;
        const left = Math.floor(position);
        const right = Math.min(left + 1, input.length - 1);
        const fraction = position - left;
        output[index] = input[left] + (input[right] - input[left]) * fraction;
      }
      return output;
    }

    function pcm16ToFloat32(buffer) {
      const view = new DataView(buffer);
      const samples = new Float32Array(buffer.byteLength / 2);
      for (let index = 0; index < samples.length; index++) {
        samples[index] = view.getInt16(index * 2, true) / 32768;
      }
      return samples;
    }

    function renderStatus(status) {
      elements.statusJson.textContent = JSON.stringify(status, null, 2);
      if (status.asr_model !== undefined) {
        elements.asrModel.value = status.asr_model || "";
      }
      if (status.asr_backend !== undefined) {
        elements.asrBackend.value = status.asr_backend || "faster-whisper";
      }
      if (status.model_hint) {
        document.getElementById("modelHint").textContent = status.model_hint;
      } else {
        updateModelHint();
      }
      if (status.tts_hint) {
        document.getElementById("ttsHint").textContent = status.tts_hint;
      } else {
        updateTtsHint();
      }
    }

    function updateModelHint() {
      const backend = elements.asrBackend.value;
      const hint = document.getElementById("modelHint");
      if (backend === "faster-whisper") {
        hint.textContent = "Use a faster-whisper model name like base.en, small.en, large-v3, or turbo. Do not put a transcript here.";
        if (elements.asrModel.value.trim().includes(" ")) {
          elements.asrModel.value = "base.en";
        }
      } else {
        hint.textContent = "GPU-only ASR is enforced. Unsupported backends are reset to faster-whisper.";
      }
    }

    function updateTtsHint() {
      const backend = elements.ttsBackend.value;
      const hint = document.getElementById("ttsHint");
      if (backend === "coqui-xtts") {
        hint.textContent = "GPU-only Coqui XTTS. Requires Coqui install and an enrollment WAV. Missing setup is reported as an error.";
      } else {
        hint.textContent = "GPU-only TTS is enforced. Unsupported backends are reset to coqui-xtts.";
      }
    }

    function appendLog(message) {
      const entry = document.createElement("div");
      entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
      elements.log.prepend(entry);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[character]));
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function applySocketConfig(payload) {
      if (!state.socket || state.socket.readyState !== WebSocket.OPEN) {
        return Promise.resolve(false);
      }
      state.processorReady = false;
      updateStartButton();
      state.configPromise = new Promise(resolve => {
        state.configResolver = resolve;
        window.setTimeout(() => {
          if (state.configResolver === resolve) {
            state.configResolver = null;
            state.configPromise = null;
            appendLog("Processor initialization is still running");
            resolve(false);
          }
        }, 45000);
      });
      state.socket.send(JSON.stringify({ type: "config", config: payload }));
      return state.configPromise;
    }

    function waitForSocketOpen() {
      if (state.socket && state.socket.readyState === WebSocket.OPEN) {
        return Promise.resolve(true);
      }
      return new Promise(resolve => {
        const started = Date.now();
        const timer = window.setInterval(() => {
          if (state.socket && state.socket.readyState === WebSocket.OPEN) {
            window.clearInterval(timer);
            resolve(true);
          } else if (Date.now() - started > 5000) {
            window.clearInterval(timer);
            resolve(false);
          }
        }, 50);
      });
    }

    function waitForProcessorReady() {
      if (state.processorReady) {
        return Promise.resolve(true);
      }
      return state.configPromise || Promise.resolve(false);
    }

    function updateStartButton() {
      startMicButton.disabled = !state.processorReady;
      startMicButton.textContent = state.processorReady ? "Start Mic" : "Waiting";
    }
  </script>
</body>
</html>
